<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Component Discovery</title>
  <link rel="stylesheet" href="/design-tokens.css">
  <style>
    body {
      margin: 0;
      font-family: var(--font-body, Arial, sans-serif);
      background: linear-gradient(180deg, var(--bg-primary, #f5f4f2), var(--surface-muted, #f0ede9));
      color: var(--text-primary, #111);
    }

    .shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    .hero {
      display: grid;
      gap: 1rem;
      padding: 1.5rem;
      border: 1px solid var(--border-primary, #ebebeb);
      border-radius: 24px;
      background: var(--bg-secondary, #fff);
      box-shadow: var(--shadow-md, 0 4px 16px rgba(0,0,0,0.08));
    }

    h1 {
      margin: 0;
      font-family: var(--font-heading, sans-serif);
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 0.95;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.8fr 1fr 1fr;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .toolbar input,
    .toolbar select,
    .toolbar button {
      padding: 0.85rem 1rem;
      border-radius: 14px;
      border: 1px solid var(--border-primary, #ebebeb);
      background: var(--card-bg, #fff);
      color: var(--text-primary, #111);
      box-shadow: var(--shadow-sm, 0 2px 8px rgba(0,0,0,0.06));
    }

    .toolbar button {
      cursor: pointer;
      background: var(--accent, #eb6835);
      color: #fff;
      font-weight: 700;
      border-color: transparent;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .filter-card {
      padding: 1rem;
      border-radius: 18px;
      background: var(--bg-secondary, #fff);
      border: 1px solid var(--border-primary, #ebebeb);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .chip {
      border: 1px solid var(--border-primary, #ebebeb);
      background: var(--surface-muted, #f0ede9);
      padding: 0.5rem 0.75rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.88rem;
    }

    .chip.active {
      background: var(--accent, #eb6835);
      color: #fff;
      border-color: transparent;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .stat {
      padding: 0.9rem 1rem;
      border-radius: 18px;
      background: var(--bg-secondary, #fff);
      border: 1px solid var(--border-primary, #ebebeb);
    }

    .stat .label {
      font-size: 0.82rem;
      color: var(--text-secondary, #666);
    }

    .stat .value {
      font-size: 1.7rem;
      font-weight: 800;
    }

    .results {
      margin-top: 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1rem;
    }

    .card {
      padding: 1rem;
      border-radius: 22px;
      background: var(--bg-secondary, #fff);
      border: 1px solid var(--border-primary, #ebebeb);
      box-shadow: var(--shadow-sm, 0 2px 8px rgba(0,0,0,0.06));
    }

    .card header {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: start;
    }

    .score {
      font-weight: 800;
      color: var(--accent, #eb6835);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.75rem;
    }

    .tag {
      padding: 0.35rem 0.55rem;
      border-radius: 999px;
      background: var(--surface-muted, #f0ede9);
      font-size: 0.78rem;
    }

    .empty {
      padding: 2rem;
      text-align: center;
      color: var(--text-secondary, #666);
      border: 1px dashed var(--border-primary, #ebebeb);
      border-radius: 22px;
      background: rgba(255,255,255,0.35);
      margin-top: 1rem;
    }

    .row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .muted { color: var(--text-secondary, #666); }

    @media (max-width: 900px) {
      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script type="module">
    import '/js/core/component-versioning.js';
    import '/js/core/component-discovery.js';
    import '/js/core/component-index.js';

    window.addEventListener('DOMContentLoaded', async () => {
      await ComponentDiscovery.init();
      hydrateFacets();
      render();
    });

    let state = {
      query: '',
      category: '',
      tag: '',
      hasDocs: false,
      minScore: 0,
      sort: 'relevance'
    };

    function getSearchOptions() {
      return {
        query: state.query,
        filters: {
          categories: state.category ? [state.category.toLowerCase()] : [],
          tags: state.tag ? [state.tag.toLowerCase()] : [],
          hasDocs: state.hasDocs ? true : null,
          minScore: Number(state.minScore) || 0
        },
        sort: state.sort,
        limit: 50
      };
    }

    function render() {
      const result = ComponentDiscovery.discover(state.query, getSearchOptions());
      document.getElementById('resultCount').textContent = result.summary.returned;
      document.getElementById('matchCount').textContent = result.summary.total;
      document.getElementById('facetCount').textContent = result.facets.categories.length;
      document.getElementById('docCount').textContent = result.summary.docs;

      const resultsEl = document.getElementById('results');
      resultsEl.innerHTML = '';

      if (result.results.length === 0) {
        resultsEl.innerHTML = '<div class="empty">No components matched the current filters. Try a broader query.</div>';
        return;
      }

      result.results.forEach((item) => {
        const article = document.createElement('article');
        article.className = 'card';
        article.innerHTML = `
          <header>
            <div>
              <div class="row"><strong>${item.title}</strong> <span class="muted">${item.category}</span></div>
              <div class="muted">${item.path || 'No page linked'}</div>
            </div>
            <div class="score">${item.documentationScore}/100</div>
          </header>
          <p>${item.description || 'No description available.'}</p>
          <div class="tags">${item.tags.map((tag) => `<span class="tag">${tag}</span>`).join('')}</div>
        `;
        resultsEl.appendChild(article);
      });
    }

    window.componentDiscoverySearch = () => render();
    window.setDiscoveryState = (patch) => {
      state = { ...state, ...patch };
      render();
    };

    window.addEventListener('component-discovery:refresh', render);
  </script>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="row">
        <div>
          <div class="muted">Advanced component search & discovery</div>
          <h1>Find components by title, tag, category, or quality score</h1>
        </div>
      </div>

      <div class="toolbar">
        <input id="searchBox" type="search" placeholder="Search components, aliases, descriptions..." autocomplete="off" />
        <select id="sortSelect">
          <option value="relevance">Sort: Relevance</option>
          <option value="title">Sort: Title</option>
          <option value="score">Sort: Score</option>
          <option value="category">Sort: Category</option>
        </select>
        <button id="resetButton" type="button">Reset filters</button>
      </div>

      <div class="filters">
        <div class="filter-card">
          <strong>Categories</strong>
          <div id="categoryChips" class="chips"></div>
        </div>
        <div class="filter-card">
          <strong>Tags</strong>
          <div id="tagChips" class="chips"></div>
        </div>
        <div class="filter-card">
          <strong>Quality</strong>
          <div class="row" style="margin-top: 0.75rem;">
            <label class="muted" for="minScore">Min score</label>
            <input id="minScore" type="range" min="0" max="100" step="5" value="0" />
            <span id="minScoreLabel">0</span>
          </div>
          <div style="margin-top: 0.75rem;">
            <label><input id="hasDocs" type="checkbox" /> Only show items with docs</label>
          </div>
        </div>
      </div>

      <div class="meta">
        <div class="stat"><div class="label">Returned</div><div id="resultCount" class="value">0</div></div>
        <div class="stat"><div class="label">Matched</div><div id="matchCount" class="value">0</div></div>
        <div class="stat"><div class="label">Categories</div><div id="facetCount" class="value">0</div></div>
        <div class="stat"><div class="label">With docs</div><div id="docCount" class="value">0</div></div>
      </div>
    </section>

    <section id="results" class="results"></section>
  </div>

  <script>
    const searchBox = document.getElementById('searchBox');
    const sortSelect = document.getElementById('sortSelect');
    const resetButton = document.getElementById('resetButton');
    const minScore = document.getElementById('minScore');
    const minScoreLabel = document.getElementById('minScoreLabel');
    const hasDocs = document.getElementById('hasDocs');
    const categoryChips = document.getElementById('categoryChips');
    const tagChips = document.getElementById('tagChips');

    function createChip(name, type) {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'chip';
      button.dataset.value = name;
      button.dataset.type = type;
      button.textContent = name;
      button.addEventListener('click', () => {
        if (type === 'category') {
          const active = state.category === name ? '' : name;
          state.category = active;
          updateChipStyles(categoryChips, state.category);
        } else {
          const active = state.tag === name ? '' : name;
          state.tag = active;
          updateChipStyles(tagChips, state.tag);
        }
        render();
      });
      return button;
    }

    function updateChipStyles(container, activeValue) {
      container.querySelectorAll('.chip').forEach((chip) => {
        chip.classList.toggle('active', chip.dataset.value === activeValue);
      });
    }

    function hydrateFacets() {
      const facets = ComponentDiscovery.getFacets();
      categoryChips.innerHTML = '';
      tagChips.innerHTML = '';
      facets.categories.slice(0, 10).forEach((item) => categoryChips.appendChild(createChip(item.name, 'category')));
      facets.tags.slice(0, 12).forEach((item) => tagChips.appendChild(createChip(item.name, 'tag')));
    }

    searchBox.addEventListener('input', () => {
      state.query = searchBox.value.trim();
      render();
    });

    sortSelect.addEventListener('change', () => {
      state.sort = sortSelect.value;
      render();
    });

    minScore.addEventListener('input', () => {
      state.minScore = Number(minScore.value);
      minScoreLabel.textContent = String(state.minScore);
      render();
    });

    hasDocs.addEventListener('change', () => {
      state.hasDocs = hasDocs.checked;
      render();
    });

    resetButton.addEventListener('click', () => {
      state = { query: '', category: '', tag: '', hasDocs: false, minScore: 0, sort: 'relevance' };
      searchBox.value = '';
      sortSelect.value = 'relevance';
      minScore.value = '0';
      minScoreLabel.textContent = '0';
      hasDocs.checked = false;
      updateChipStyles(categoryChips, '');
      updateChipStyles(tagChips, '');
      render();
    });

  </script>
</body>
</html>
