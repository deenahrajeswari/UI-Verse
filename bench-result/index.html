<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Bench Result Dashboard</title>

  <!-- GOOGLE FONT -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f172a;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f8fafc;
      --muted: #94a3b8;

      --primary: #6366f1;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    body {
      font-family: "Inter", sans-serif;
      background:
        radial-gradient(circle at top left, #1e293b, #0f172a 45%),
        #0f172a;
      color: var(--text);
      min-height: 100vh;
      padding: 30px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    /* HEADER */

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .header-left h1 {
      font-size: 2.4rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .header-left p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .search-box {
      position: relative;
      min-width: 260px;
    }

    .search-box input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.07);
      color: white;
      outline: none;
      transition: 0.3s ease;
      font-size: 0.95rem;
    }

    .search-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    .search-box span {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.7;
    }

    /* STATS */

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      border-radius: 22px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .card::before {
      content: "";
      position: absolute;
      top: -50px;
      right: -50px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
    }

    .card h3 {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 15px;
      font-weight: 600;
    }

    .card p {
      font-size: 2rem;
      font-weight: 800;
    }

    .card.primary {
      border-left: 5px solid var(--primary);
    }

    .card.success {
      border-left: 5px solid var(--success);
    }

    .card.danger {
      border-left: 5px solid var(--danger);
    }

    .card.warning {
      border-left: 5px solid var(--warning);
    }

    /* TABLE */

    .table-wrapper {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    .table-top {
      padding: 22px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .table-top h2 {
      font-size: 1.2rem;
    }

    .table-top p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    thead {
      background: rgba(255, 255, 255, 0.06);
    }

    th,
    td {
      padding: 18px 24px;
      text-align: left;
    }

    th {
      color: #cbd5e1;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    tbody tr {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      transition: 0.25s ease;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    td {
      font-size: 0.95rem;
    }

    .score {
      font-weight: 700;
    }

    .badge {
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      display: inline-block;
    }

    .pass {
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
    }

    .fail {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
    }

    /* RESPONSIVE */

    @media (max-width: 768px) {
      body {
        padding: 18px;
      }

      .header-left h1 {
        font-size: 2rem;
      }

      th,
      td {
        padding: 16px;
      }

      .card p {
        font-size: 1.7rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- HEADER -->
    <header class="header">

      <div class="header-left">
        <h1>Bench Results Dashboard</h1>
        <p>Performance overview, analytics & candidate insights</p>
      </div>

      <div class="search-box">
        <span>🔍</span>
        <input
          type="text"
          id="searchInput"
          placeholder="Search candidate..."
        />
      </div>

    </header>

    <!-- STATS -->
    <section class="stats">

      <div class="card primary">
        <h3>Total Candidates</h3>
        <p id="total">0</p>
      </div>

      <div class="card success">
        <h3>Passed</h3>
        <p id="passed">0</p>
      </div>

      <div class="card danger">
        <h3>Failed</h3>
        <p id="failed">0</p>
      </div>

      <div class="card warning">
        <h3>Average Score</h3>
        <p id="average">0%</p>
      </div>

    </section>

    <!-- TABLE -->
    <section class="table-wrapper">

      <div class="table-top">
        <div>
          <h2>Candidate Results</h2>
          <p>Live result tracking table</p>
        </div>
      </div>

      <div class="table-container">
        <table>

          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Score</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody id="resultTable"></tbody>

        </table>
      </div>

    </section>

  </div>

  <script>
    const results = [
      { name: "Aman Verma", score: 92 },
      { name: "Priya Singh", score: 76 },
      { name: "Rahul Das", score: 45 },
      { name: "Sneha Roy", score: 88 },
      { name: "Rohit Kumar", score: 39 },
      { name: "Anjali Sharma", score: 81 },
      { name: "Vikash Gupta", score: 57 },
      { name: "Neha Kapoor", score: 63 },
      { name: "Karan Mehta", score: 28 },
      { name: "Pooja Jain", score: 71 }
    ];

    const table = document.getElementById("resultTable");
    const searchInput = document.getElementById("searchInput");

    function renderTable(data) {
      table.innerHTML = "";

      data.forEach((candidate, index) => {
        const status = candidate.score >= 50 ? "Passed" : "Failed";

        table.innerHTML += `
          <tr>
            <td>${index + 1}</td>
            <td>${candidate.name}</td>
            <td class="score">${candidate.score}%</td>
            <td>
              <span class="badge ${status === "Passed" ? "pass" : "fail"}">
                ${status}
              </span>
            </td>
          </tr>
        `;
      });
    }

    function updateStats(data) {
      const total = data.length;
      const passed = data.filter(c => c.score >= 50).length;
      const failed = total - passed;

      const average = (
        data.reduce((sum, c) => sum + c.score, 0) / total
      ).toFixed(1);

      document.getElementById("total").textContent = total;
      document.getElementById("passed").textContent = passed;
      document.getElementById("failed").textContent = failed;
      document.getElementById("average").textContent = average + "%";
    }

    searchInput.addEventListener("input", (e) => {
      const value = e.target.value.toLowerCase();

      const filtered = results.filter(candidate =>
        candidate.name.toLowerCase().includes(value)
      );

      renderTable(filtered);
      updateStats(filtered);
    });

    renderTable(results);
    updateStats(results);
  </script>

</body>
</html>
